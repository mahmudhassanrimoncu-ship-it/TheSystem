<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">

<!-- ── Single large preview centred ── -->
<rect x="190" y="20" width="300" height="300" rx="56" fill="#F7F8FA" stroke="#D6D8DA" stroke-width="3" style="fill:rgb(247, 248, 250);stroke:rgb(214, 216, 218);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Left blue accent bar -->
<rect x="190" y="64" width="14" height="172" rx="7" fill="#1865F2" style="fill:rgb(24, 101, 242);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- ── Letter r — clearly separate, left side ── -->
<!-- Vertical stem -->
<rect x="234" y="74" width="22" height="152" rx="11" fill="#1865F2" style="fill:rgb(24, 101, 242);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Arm curving right and stopping — does NOT connect to e -->
<path d="M256 112 Q260 76 296 82 Q312 86 318 104" fill="none" stroke="#1865F2" stroke-width="22" stroke-linecap="round" style="fill:none;stroke:rgb(24, 101, 242);color:rgb(0, 0, 0);stroke-width:22px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Gap of ~18px between r and e intentionally left empty -->

<!-- ── Letter e — clearly separate, right side ── -->
<!-- e crossbar — horizontal middle stroke -->
<line x1="342" y1="158" x2="444" y2="158" stroke="#1865F2" stroke-width="22" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(24, 101, 242);color:rgb(0, 0, 0);stroke-width:22px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- e outer arc — open on right, does NOT touch r -->
<path d="M444 158 Q452 116 420 92 Q390 70 360 86 Q334 100 334 136 Q334 174 358 192 Q390 210 432 196" fill="none" stroke="#1865F2" stroke-width="22" stroke-linecap="round" style="fill:none;stroke:rgb(24, 101, 242);color:rgb(0, 0, 0);stroke-width:22px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Teal underline bar -->
<rect x="210" y="278" width="260" height="14" rx="7" fill="#14BF96" style="fill:rgb(20, 191, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>
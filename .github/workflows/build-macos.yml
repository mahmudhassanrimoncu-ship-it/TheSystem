name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake qt6
          echo "QT_PREFIX=$(brew --prefix qt6)" >> $GITHUB_ENV

      # Build .icns from the 1024px PNG committed in the repo.
      # iconutil is a macOS-only tool — this is why we do it here
      # instead of on Fedora during icon generation.
      - name: Build .icns icon
        run: |
          mkdir -p icons/reSTEM.iconset

          # Generate all required sizes from the 1024px source PNG
          sips -z 16   16   icons/restem_1024.png --out icons/reSTEM.iconset/icon_16x16.png
          sips -z 32   32   icons/restem_1024.png --out icons/reSTEM.iconset/icon_16x16@2x.png
          sips -z 32   32   icons/restem_1024.png --out icons/reSTEM.iconset/icon_32x32.png
          sips -z 64   64   icons/restem_1024.png --out icons/reSTEM.iconset/icon_32x32@2x.png
          sips -z 128  128  icons/restem_1024.png --out icons/reSTEM.iconset/icon_128x128.png
          sips -z 256  256  icons/restem_1024.png --out icons/reSTEM.iconset/icon_128x128@2x.png
          sips -z 256  256  icons/restem_1024.png --out icons/reSTEM.iconset/icon_256x256.png
          sips -z 512  512  icons/restem_1024.png --out icons/reSTEM.iconset/icon_256x256@2x.png
          sips -z 512  512  icons/restem_1024.png --out icons/reSTEM.iconset/icon_512x512.png
          sips -z 1024 1024 icons/restem_1024.png --out icons/reSTEM.iconset/icon_512x512@2x.png

          iconutil -c icns icons/reSTEM.iconset -o icons/reSTEM.icns
          echo "Built: icons/reSTEM.icns ($(du -sh icons/reSTEM.icns | cut -f1))"

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_PREFIX}"

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Verify app bundle
        run: |
          if [ ! -d "build/reSTEM.app" ]; then
            echo "ERROR: reSTEM.app not found"
            ls -la build/
            exit 1
          fi
          echo "Found: build/reSTEM.app"
          echo "Icon in bundle:"
          ls build/reSTEM.app/Contents/Resources/*.icns 2>/dev/null || echo "WARNING: no icns found in bundle"

      - name: Run macdeployqt
        run: |
          ${QT_PREFIX}/bin/macdeployqt build/reSTEM.app -verbose=2

      - name: Code sign
        run: |
          codesign --force --deep --sign - build/reSTEM.app

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R build/reSTEM.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "reSTEM" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            reSTEM.dmg
          ls -lh reSTEM.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: reSTEM-macOS
          path: reSTEM.dmg
          retention-days: 30
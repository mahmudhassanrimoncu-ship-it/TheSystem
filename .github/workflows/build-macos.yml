name: Build macOS DMG

on:
  push:
    tags: ['v*']        # triggers on git tag e.g. "v1.0"
  workflow_dispatch:    # also lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: brew install qt6 cmake

      - name: Build Release
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt6) \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Bundle & create DMG
        run: |
          $(brew --prefix qt6)/bin/macdeployqt build/TheSystem.app -verbose=1
          codesign --force --deep --sign - build/TheSystem.app
          hdiutil create -volname "The System" \
            -srcfolder build/TheSystem.app \
            -ov -format UDZO TheSystem.dmg

      - name: Upload DMG as release asset
        uses: actions/upload-artifact@v4
        with:
          name: TheSystem-macOS
          path: TheSystem.dmg
name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake qt6
          echo "QT_PREFIX=$(brew --prefix qt6)" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_PREFIX}"

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Verify app bundle
        run: |
          if [ ! -d "build/reSTEM.app" ]; then
            echo "ERROR: reSTEM.app not found"
            ls -la build/
            exit 1
          fi
          echo "Found: build/reSTEM.app"

      - name: Run macdeployqt
        run: |
          ${QT_PREFIX}/bin/macdeployqt build/reSTEM.app -verbose=2

      - name: Code sign
        run: |
          codesign --force --deep --sign - build/reSTEM.app

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R build/reSTEM.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "reSTEM" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            reSTEM.dmg
          ls -lh reSTEM.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: reSTEM-macOS
          path: reSTEM.dmg
          retention-days: 30
name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Install Qt6 directly via aqtinstall (no third-party action)
      # This avoids jurplel/install-qt-action which uses Node.js 20 internally
      - name: Install Qt6 via aqtinstall
        shell: powershell
        run: |
          pip install aqtinstall --quiet
          $qtDir = "D:\Qt"
          aqt install-qt windows desktop 6.7.0 win64_msvc2019_64 `
            --outputdir $qtDir
          $qtRoot = "$qtDir\6.7.0\msvc2019_64"
          Write-Host "Qt installed at: $qtRoot"
          # Make available to subsequent steps
          echo "QT_ROOT=$qtRoot" >> $env:GITHUB_ENV
          echo "$qtRoot\bin" >> $env:GITHUB_PATH

      # ── 3. Configure CMake ────────────────────────────────────────
      - name: Configure CMake
        shell: powershell
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      # ── 4. Build ─────────────────────────────────────────────────
      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release

      # ── 5. Verify the .exe ───────────────────────────────────────
      - name: Verify executable
        shell: powershell
        run: |
          if (-not (Test-Path "build\Release\TheSystem.exe")) {
            Write-Error "TheSystem.exe not found"
            Get-ChildItem build\ -Recurse -Filter "*.exe"
            exit 1
          }
          Write-Host "Found: build\Release\TheSystem.exe"

      # ── 6. Bundle Qt DLLs ────────────────────────────────────────
      - name: Bundle Qt DLLs with windeployqt
        shell: powershell
        run: |
          $windeployqt = "$env:QT_ROOT\bin\windeployqt.exe"
          if (-not (Test-Path $windeployqt)) {
            Write-Error "windeployqt.exe not found at: $windeployqt"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          Copy-Item "build\Release\TheSystem.exe" "deploy\"
          & $windeployqt `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            "deploy\TheSystem.exe"
          Write-Host "Deploy contents:"
          Get-ChildItem deploy\ | Select-Object Name, Length

      # ── 7. Install NSIS ──────────────────────────────────────────
      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            Write-Error "makensis.exe not found"
            exit 1
          }
          Write-Host "NSIS ready"
          & $makensis /VERSION

      # ── 8. Create installer ──────────────────────────────────────
      - name: Create installer with NSIS
        shell: powershell
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $makensis installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NSIS failed with exit code $LASTEXITCODE"
            exit 1
          }
          if (-not (Test-Path "TheSystem-Setup.exe")) {
            Write-Error "TheSystem-Setup.exe was not created"
            exit 1
          }
          $size = (Get-Item "TheSystem-Setup.exe").Length / 1MB
          Write-Host ("Installer: TheSystem-Setup.exe ({0:N1} MB)" -f $size)

      # ── 9. Upload artifact ───────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheSystem-Windows-Setup
          path: TheSystem-Setup.exe
          retention-days: 30
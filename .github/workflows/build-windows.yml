name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure & Build
        shell: cmd
        run: |
          cmake -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%"
          cmake --build build --config Release

      - name: Verify executable
        shell: cmd
        run: |
          if not exist "build\Release\TheSystem.exe" (
            echo ERROR: TheSystem.exe not found
            dir build\
            exit /b 1
          )
          echo Found: build\Release\TheSystem.exe

      - name: Bundle Qt DLLs with windeployqt
        shell: cmd
        run: |
          mkdir deploy
          copy build\Release\TheSystem.exe deploy\
          "%Qt6_DIR%\bin\windeployqt.exe" ^
            --release ^
            --no-translations ^
            --no-system-d3d-compiler ^
            deploy\TheSystem.exe

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y
          # Refresh PATH so makensis is available in this session
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
          echo "NSIS installed. Verifying..."
          & "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION

      - name: Create installer with NSIS
        shell: powershell
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            Write-Error "makensis.exe not found at expected path"
            exit 1
          }
          & $makensis installer.nsi
          if (-not (Test-Path "TheSystem-Setup.exe")) {
            Write-Error "Installer was not created"
            exit 1
          }
          Write-Host "Installer created successfully"
          Get-Item "TheSystem-Setup.exe" | Select-Object Name, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheSystem-Windows-Setup
          path: TheSystem-Setup.exe
          retention-days: 30
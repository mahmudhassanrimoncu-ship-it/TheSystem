name: Build Windows Installer

on:
  workflow_dispatch:   # run manually from GitHub Actions tab
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase'

      - name: Configure & Build
        shell: cmd
        run: |
          cmake -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          cmake --build build --config Release

      - name: Bundle Qt DLLs with windeployqt
        shell: cmd
        run: |
          mkdir deploy
          copy build\Release\TheSystem.exe deploy\
          "${{ env.Qt6_DIR }}\bin\windeployqt.exe" ^
            --release ^
            --no-translations ^
            --no-system-d3d-compiler ^
            deploy\TheSystem.exe

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installer with NSIS
        shell: cmd
        run: makensis installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TheSystem-Windows-Setup
          path: TheSystem-Setup.exe